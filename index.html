<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="data:;base64,iVBORw0KGgo=">
		<title>d2l-channel demo</title>
		<style>
			body {
				margin: 0;
				padding: 24px;
				font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
				background: #f7f7f8;
			}
			main {
				max-width: 760px;
				margin: 0 auto;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>d2l-channel</h1>

			<d2l-channel name="Announcements" description="Latest updates from your instructor">
				<p>Welcome to the course! Please read the syllabus.</p>
			</d2l-channel>

			<br />

			<d2l-channel name="General" description="Open discussion"></d2l-channel>

			<h2 style="margin-top:24px">Event log</h2>
			<ul id="log" style="font-size:14px;color:#333"></ul>
		</main>

		<script type="module">
			import '../src/d2l-channel.js'

			const log = document.getElementById('log')

			function append(label, detail) {
				const li = document.createElement('li')
				const time = new Date(detail.payload.ts).toLocaleTimeString()
				li.textContent = `[${time}] ${label} #${detail.topic}: ${detail.payload.text}`
				log.prepend(li)
			}

			document.addEventListener('d2l-channel-message', (e) => append('received', e.detail))
			document.addEventListener('d2l-channel-send', (e) => append('sent', e.detail))
		</script>
	</body>
</html>
